name: Actualizar Dashboard

on:
  schedule:
    # Corre todos los días a las 08:00 hora Chile (UTC-3 = 11:00 UTC)
    - cron: '0 11 * * *'
  # También permite correrlo manualmente desde GitHub
  workflow_dispatch:

jobs:
  actualizar:
    runs-on: ubuntu-latest

    steps:
      - name: Descargar repositorio
        uses: actions/checkout@v4

      - name: Configurar Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Instalar dependencias
        run: pip install pandas openpyxl requests

      - name: Generar dashboard
        run: python generar_dashboard.py

      - name: Publicar cambios
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add index.html
          git diff --staged --quiet || git commit -m "Dashboard actualizado $(date +'%d/%m/%Y %H:%M')"
          git push
